<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,600;1,400&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
    <link rel="icon" type="image/png" sizes="32x32" href="./assets/favicon.svg" />
    <title>Kanban Task Management</title>
  </head>

  <body>
    <!-- Navigation Sidebar: Contains the logo, navigation links for boards, and theme toggle. -->
    <nav class="side-bar" id="side-bar-div">
      <div id="side-logo-div">
        <img id="logo" src="./assets/logo-light.svg" alt="logo-light" />
      </div>
      <div class="boards-nav-links-div" id="boards-nav-links-div">
        <h4 id="headline-sidepanel">ALL BOARDS (1)</h4>
        <button class="board-btn">Launch Career</button>
      </div>
    </nav>

    <!-- Main Layout: Header with board title, add task button, and main content area for task columns. -->
    <div id="layout">
      <header id="header" class="sticky-header">
        <div class="header-name-div">
          <img src="./assets/favicon.svg" alt="logo-mobile" class="logo-mobile" />
          <h2 class="header-board-name" id="header-board-name">Launch Career</h2>
        </div>
      </header>

      <div class="container">
        <main class="card-column-main">
          <!-- Task Columns: Display tasks grouped by status (TODO, DOING, DONE). -->
          <div class="column-div" data-status="todo">
            <div id="todo-head-div" class="column-head-div">
              <span class="dot" id="todo-dot"></span>
              <h4 id="toDoText" class="columnHeader">TODO (0)</h4>
            </div>
            <!-- Tasks container for TODO -->
            <div class="tasks-container" id="todo-tasks"></div>
          </div>

          <!-- DOING Column -->
          <div class="column-div" data-status="doing">
            <div id="doing-head-div" class="column-head-div">
              <span class="dot" id="doing-dot"></span>
              <h4 id="doingText" class="columnHeader">DOING (0)</h4>
            </div>
            <!-- Tasks container for DOING -->
            <div class="tasks-container" id="doing-tasks"></div>
          </div>

          <!-- DONE Column -->
          <div class="column-div" data-status="done">
            <div id="done-head-div" class="column-head-div">
              <span class="dot" id="done-dot"></span>
              <h4 id="doneText" class="columnHeader">DONE (0)</h4>
            </div>
            <!-- Tasks container for DONE -->
            <div class="tasks-container" id="done-tasks"></div>
          </div>
        </main>
      </div>
    </div>

    <!-- Task Detail Modal -->
    <div
      class="modal-backdrop"
      id="modal-backdrop"
      role="dialog"
      aria-modal="true"
      aria-labelledby="modal-title"
      hidden
    >
      <div class="modal">
        <h3 class="modal-title" id="modal-title">Task Details</h3>

        <div class="modal-field">
          <label for="modal-task-title">Title</label>
          <input type="text" id="modal-task-title" placeholder="Task title" />
        </div>

        <div class="modal-field">
          <label for="modal-task-desc">Description</label>
          <textarea id="modal-task-desc" rows="4" placeholder="Task description"></textarea>
        </div>

        <div class="modal-field">
          <label for="modal-task-status">Current Status</label>
          <select id="modal-task-status">
            <option value="todo">Todo</option>
            <option value="doing">Doing</option>
            <option value="done">Done</option>
          </select>
        </div>

        <div class="modal-actions">
          <button class="btn-save" id="modal-save-btn">Save Changes</button>
          <button class="btn-close" id="modal-close-btn">Close</button>
        </div>
      </div>
    </div>

    <script src="./initialData.js"></script>
    <script src="./scripts.js"></script>
  </body>
</html>
